name: Build Linux DEB Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'

jobs:
  build-deb:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jpackage dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2 xvfb

      - name: Set up JDK 25 (Liberica with bundled JavaFX)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-package: jdk+fx

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests
        run: xvfb-run --auto-servernum ./gradlew test --no-daemon

      - name: Build DEB installer
        run: ./gradlew jpackageInstaller --no-daemon

      - name: List build outputs
        run: find build/jpackage -type f -ls

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConversorOFX-DEB-Installer
          path: build/jpackage/*.deb
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Conversor OFX para Excel

            ### Windows (.msi)
            1. Baixe o arquivo `.msi`
            2. De clique duplo para instalar
            3. O instalador cria atalho no Menu Iniciar e na Area de Trabalho

            ### Linux (.deb)
            1. Baixe o arquivo `.deb`
            2. Instale com: `sudo dpkg -i conversor-ofx_*.deb`
            3. Caso necessario, instale dependencias: `sudo apt-get install -f`
            4. O aplicativo aparece no menu Aplicativos > Escritorio

            ### Recursos
            - Conversao de arquivos `.ofx` para `.xlsx`
            - Arrastar e soltar arquivos OFX
            - Abre automaticamente ao clicar em arquivos `.ofx`
          draft: false
          prerelease: false
          files: build/jpackage/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
