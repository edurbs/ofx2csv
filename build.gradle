plugins {
    id 'application'
    id 'java'
    id 'org.beryx.runtime' version '2.0.1'
}

group = 'com.mcs'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

application {
    mainClass = 'com.mcs.ofx2csv.Ofx2CsvApp'
    applicationDefaultJvmArgs = [
        '--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED',
        '--add-opens=javafx.controls/com.sun.javafx.scene.control.behavior=ALL-UNNAMED'
    ]
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.openjfx:javafx-controls:25.0.1'
    implementation 'org.openjfx:javafx-fxml:25.0.1'

    implementation 'com.webcohesion.ofx4j:ofx4j:1.39'
    implementation 'org.apache.poi:poi-ooxml:5.3.0'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // TestFX for E2E UI testing
    testImplementation 'org.testfx:testfx-core:4.0.18'
    testImplementation 'org.testfx:testfx-junit5:4.0.18'
    testImplementation 'org.assertj:assertj-core:3.26.3'
    testImplementation 'org.hamcrest:hamcrest:2.2'
}

test {
    useJUnitPlatform()

    // Required for TestFX headless UI tests
    if (System.getenv('CI') != null || System.getProperty('java.awt.headless') != null) {
        jvmArgs += [
            '--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED',
            '--add-opens=javafx.controls/com.sun.javafx.scene.control.behavior=ALL-UNNAMED'
        ]
    }
}

// --- jlink + jpackage configuration ---
runtime {
    options = ['--strip-debug', '--compress', 'zip-6', '--no-header-files', '--no-man-pages']
    modules = [
        'javafx.base', 'javafx.graphics', 'javafx.controls', 'javafx.fxml',
        'java.sql', 'java.logging', 'java.xml', 'java.desktop',
        'java.xml.crypto', 'java.security.jgss'
    ]

    launcher {
        noConsole = true
        jvmArgs = [
            '--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED',
            '--add-opens=javafx.controls/com.sun.javafx.scene.control.behavior=ALL-UNNAMED'
        ]
    }

    jpackage {
        // Workaround: Gradle 9.x requires explicit dependency declaration
        tasks.jpackageImage.dependsOn(tasks.runtime)
        tasks.jpackage.dependsOn(tasks.jpackageImage)

        outputDir = 'jpackage'
        imageName = 'Conversor OFX'
        installerName = 'ConversorOFX'
        installerType = 'msi'
        appVersion = project.version
        resourceDir = project.file('src/packaging')

        jvmArgs = [
            '--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED',
            '--add-opens=javafx.controls/com.sun.javafx.scene.control.behavior=ALL-UNNAMED'
        ]

        installerOptions = [
            '--win-menu',
            '--win-shortcut',
            '--win-dir-chooser',
            '--file-associations', project.file('src/packaging/ofx-association.properties').absolutePath
        ]

        // Skip installer on non-Windows (Linux/macOS: only produce app-image)
        if (!System.getProperty('os.name').toLowerCase().contains('win')) {
            skipInstaller = true
        }
    }
}
